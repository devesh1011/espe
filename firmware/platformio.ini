[platformio]
default_envs = user-device, ground-receiver

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
  -std=gnu++17
  -DESPRESSO_FIRMWARE_VERSION=\"0.1.0\"
lib_deps =
  jgromes/RadioLib@^7.3.0
  adafruit/Adafruit SSD1306@^2.5.15
  adafruit/Adafruit GFX Library@^1.12.3
  kmackay/micro-ecc@^1.0.0
  rweather/Crypto@^0.4.0

[env:user-device]
build_flags =
  ${env.build_flags}
  -DESPRESSO_ROLE_USER_DEVICE

[env:ground-receiver]
build_flags =
  ${env.build_flags}
  -DESPRESSO_ROLE_GROUND_RECEIVER
